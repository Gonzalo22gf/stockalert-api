name: Alertas diarias por correo

on:
  schedule:
    # 9:00 UTC = 6:00 AM Argentina
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  enviar-alertas:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar envio de alertas (con reintentos por si Render duerme)
        run: |
          curl --fail --silent --show-error \
            --max-time 120 \
            --retry 3 --retry-delay 25 --retry-all-errors \
            -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://stockalert-api.onrender.com/api/alertas/enviar-diarias
